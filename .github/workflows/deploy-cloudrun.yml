name: Deploy to Cloud Run

# Deploys the BFF container to Google Cloud Run on push to the default branch.
# Requires the repo to be configured (see docs/deploy/google-cloud-run.md):
#   Repository VARIABLES:
#     GCP_PROJECT_ID, GCP_REGION, GCP_SERVICE,
#     GCP_WIF_PROVIDER (workload identity provider resource name),
#     GCP_SERVICE_ACCOUNT (deployer SA email),
#     APP_URL, FUFIRE_API_URL, FUFIRE_API_VERSION
#   Secret Manager secrets (in GCP, NOT GitHub): FUFIRE_API_KEY, GOOGLE_MAPS_API_KEY, GEMINI_API_KEY

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (build from Dockerfile via Cloud Build)
        run: |
          gcloud run deploy "${{ vars.GCP_SERVICE }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --source=. \
            --allow-unauthenticated \
            --port=8080 \
            --set-env-vars="NODE_ENV=production,APP_URL=${{ vars.APP_URL }},FUFIRE_API_URL=${{ vars.FUFIRE_API_URL }},FUFIRE_API_VERSION=${{ vars.FUFIRE_API_VERSION }},REQUEST_TIMEOUT_MS=12000,ENABLE_LOCAL_ASTROLOGY_FALLBACK=false,ENABLE_DEMO_PROFILES=false" \
            --set-secrets="FUFIRE_API_KEY=FUFIRE_API_KEY:latest,GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest"

      - name: Show service URL
        run: |
          gcloud run services describe "${{ vars.GCP_SERVICE }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --format='value(status.url)'
